<section class="auth-simple-page">
  <div class="auth-simple-card">
    <div class="auth-simple-header">
      <h2>Log in to SmartTask</h2>
      <p>Welcome back</p>
    </div>

    <form class="auth-simple-form" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="Enter your email"
          formControlName="email"
          autocomplete="email"
        />
        <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Please enter a valid email.
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          autocomplete="current-password"
        />
        <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required.
        </small>
      </div>

      <p class="error login-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="auth-main-btn" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <div class="auth-simple-footer">
      <span>Don’t have an account?</span>
      <a routerLink="/register">Register</a>
    </div>
  </div>
</section>
