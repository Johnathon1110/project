<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-badge">SmartTask Connect</span>
      <h2>Welcome Back</h2>
      <p>Log in to continue managing tasks, applications, and chats.</p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="Enter your email"
          formControlName="email"
          autocomplete="email"
        />
        <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Please enter a valid email.
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          autocomplete="current-password"
        />
        <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required.
        </small>
      </div>

      <div class="login-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Don’t have an account?</span>
      <a routerLink="/register">Create account</a>
    </div>
  </div>
</section>
