<section class="auth-simple-page">
  <div class="auth-simple-card">
    <div class="auth-simple-header">
      <h2>Create your account</h2>
      <p>Join SmartTask as a worker or task owner</p>
    </div>

    <form class="auth-simple-form" [formGroup]="registerForm" (ngSubmit)="submitRegister()">
      <div class="role-switch">
        <button
          type="button"
          class="role-option"
          [class.active]="registerForm.get('role')?.value === 'worker'"
          (click)="registerForm.get('role')?.setValue('worker')"
        >
          Worker
        </button>

        <button
          type="button"
          class="role-option"
          [class.active]="registerForm.get('role')?.value === 'owner'"
          (click)="registerForm.get('role')?.setValue('owner')"
        >
          Task Owner
        </button>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" formControlName="fullName" />
        <small class="error" *ngIf="registerForm.get('fullName')?.touched && registerForm.get('fullName')?.invalid">
          Name must be at least 3 characters
        </small>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" formControlName="email" />
        <small class="error" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          Please enter a valid email
        </small>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" placeholder="Enter your phone" formControlName="phone" />
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" placeholder="Enter your location" formControlName="location" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password" formControlName="password" />
        <small class="error" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          Password must be at least 6 characters
        </small>
      </div>

      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="auth-main-btn">Continue</button>
    </form>

    <div class="auth-simple-footer">
      <span>Already have an account?</span>
      <a routerLink="/login">Log in</a>
    </div>
  </div>
</section>
