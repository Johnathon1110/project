<app-app-shell>
  <section class="post-task-page">
    <div class="post-task-card">
      <div class="post-task-header">
        <h2>Post a New Task</h2>
        <p>Create a short-term task and find the right worker.</p>
      </div>

      <form class="post-task-form" [formGroup]="postTaskForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" formControlName="title" placeholder="Enter task title" />
          <small class="error" *ngIf="postTaskForm.get('title')?.touched && postTaskForm.get('title')?.invalid">
            Title must be at least 3 characters
          </small>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" rows="4" placeholder="Describe the task"></textarea>
          <small class="error" *ngIf="postTaskForm.get('description')?.touched && postTaskForm.get('description')?.invalid">
            Description must be at least 10 characters
          </small>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <input type="text" formControlName="category" placeholder="e.g. Delivery, Cleaning, Design" />
          </div>

          <div class="form-group">
            <label>Type</label>
            <select formControlName="type">
              <option value="physical">Physical</option>
              <option value="remote">Remote</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Location</label>
            <input type="text" formControlName="location" placeholder="Enter task location" />
          </div>

          <div class="form-group">
            <label>Budget</label>
            <input type="number" formControlName="budget" placeholder="Enter budget" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" formControlName="date" />
          </div>

          <div class="form-group">
            <label>Required Skills</label>
            <input type="text" formControlName="requiredSkills" placeholder="e.g. Driving, Time Management" />
          </div>
        </div>

        <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button type="submit" class="submit-btn" [disabled]="isLoading">
          {{ isLoading ? 'Posting...' : 'Post Task' }}
        </button>
      </form>
    </div>
  </section>
</app-app-shell>
